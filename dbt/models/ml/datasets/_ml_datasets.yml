version: 2

models:
  - name: obt_churn_prediction
    description: "Dataset supervisado para predecir la probabilidad de que un cliente abandone el negocio."
    columns:
      - name: id_cliente_nk
        description: "Llave de negocio del cliente"
      - name: target_es_churn
        description: "Variable target binaria. 1 si el cliente no ha comprado en más de 90 días, 0 en caso contrario."

  - name: obt_customer_segmentation
    description: "Dataset no supervisado de segmentación (K-Means/RFM). Sin target."
    
  - name: obt_customer_lifetime_value
    description: "Dataset supervisado de regresión para predecir el LTV."
    columns:
      - name: target_clv_historico
        description: "Total histórico gastado por el cliente, utilizado como target para modelos de regresión."

  - name: obt_employee_absenteeism
    description: "Dataset supervisado para predecir si un empleado tendrá ausentismo o problemas de puntualidad."
    columns:
      - name: target_alto_riesgo_ausentismo
        description: "Binario: 1 si tiene más de 3 faltas acumuladas."

  - name: obt_delivery_time_prediction
    description: "Dataset supervisado para predecir los tiempos y finalización de deliveries."

  - name: obt_inventory_optimization
    description: "Dataset para optimización de inventario basado en modelo Newsvendor probabilístico. Calcula la cantidad óptima de compra minimizando quiebres de stock y desperdicio."
    columns:
      - name: id_insumo_nk
        description: "Llave de negocio del insumo"
      - name: feature_demanda_promedio_diaria
        description: "Demanda promedio diaria histórica del insumo (μ)"
      - name: feature_demanda_desviacion_std
        description: "Desviación estándar de la demanda diaria (σ)"
      - name: feature_demanda_esperada_lt
        description: "Demanda esperada durante el lead time (μ_LT = μ × LT)"
      - name: feature_desviacion_demanda_lt
        description: "Desviación de demanda durante lead time (σ_LT = σ × √LT)"

  - name: obt_price_elasticity
    description: "Dataset de series temporales diarias para análisis de elasticidad de precios y simulación de escenarios de pricing con modelos VAR multivariados."
    columns:
      - name: feature_precio_efectivo
        description: "Precio promedio efectivo de venta del día"
      - name: feature_cantidad_vendida
        description: "Cantidad total vendida en el día"
      - name: feature_margen_estimado
        description: "Margen estimado del día (revenue neto - costo)"
      - name: feature_variacion_precio_pct
        description: "Variación porcentual del precio efectivo vs precio base"

  - name: obt_operational_demand
    description: "Dataset diario para predicción de demanda operativa en cocina. Incluye características de tiempo, rezagos y estadísticas móviles para modelos probabilísticos."
    columns:
      - name: target_cantidad_total
        description: "Cantidad total de producto vendida en el día (variable a predecir)"
      - name: feature_lag_1_dia
        description: "Cantidad vendida el día anterior"
      - name: feature_rolling_avg_7d
        description: "Promedio móvil de ventas de los últimos 7 días"
      - name: feature_rolling_std_7d
        description: "Desviación estándar móvil de ventas de los últimos 7 días (input para incertidumbre)"
